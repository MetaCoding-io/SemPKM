modelId: basic-pkm
version: "1.1.0"
name: "Basic PKM"
description: "Personal knowledge management with Projects, People, Notes, and Concepts. Provides rich types with standard vocabulary properties, inter-type relationships, SHACL shapes for form generation, and view specifications for table, card, and graph browsing."
namespace: "urn:sempkm:model:basic-pkm:"
prefixes:
  bpkm: "urn:sempkm:model:basic-pkm:"
entrypoints:
  ontology: "ontology/basic-pkm.jsonld"
  shapes: "shapes/basic-pkm.jsonld"
  views: "views/basic-pkm.jsonld"
  seed: "seed/basic-pkm.jsonld"
  rules: "rules/basic-pkm.ttl"
entailment_defaults:
  owl_inverseOf: true
  rdfs_subClassOf: false
  rdfs_subPropertyOf: false
  owl_TransitiveProperty: false
  rdfs_domain_range: false
  shacl_rules: true
icons:
  - type: "bpkm:Note"
    icon: "file-text"
    color: "#0d9488"
    tree:
      icon: "file-text"
      color: "#0d9488"
      size: 16
    tab:
      icon: "file-text"
      color: "#0d9488"
      size: 14
    graph:
      icon: "file-text"
      color: "#0d9488"
  - type: "bpkm:Concept"
    icon: "lightbulb"
    color: "#d97706"
    tree:
      icon: "lightbulb"
      color: "#d97706"
      size: 16
    tab:
      icon: "lightbulb"
      color: "#d97706"
      size: 14
    graph:
      icon: "lightbulb"
      color: "#d97706"
  - type: "bpkm:Project"
    icon: "folder-kanban"
    color: "#4f46e5"
    tree:
      icon: "folder-kanban"
      color: "#4f46e5"
      size: 16
    tab:
      icon: "folder-kanban"
      color: "#4f46e5"
      size: 14
    graph:
      icon: "folder-kanban"
      color: "#4f46e5"
  - type: "bpkm:Person"
    icon: "user"
    color: "#e11d48"
    tree:
      icon: "user"
      color: "#e11d48"
      size: 16
    tab:
      icon: "user"
      color: "#e11d48"
      size: 14
    graph:
      icon: "user"
      color: "#e11d48"
