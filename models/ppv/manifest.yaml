modelId: ppv
version: "1.0.0"
name: "Pillars, Pipelines & Vaults"
description: "August Bradley's PPV productivity system with five-level goal hierarchy (Pillar > Value Goal > Goal Outcome > Project > Action Item), four-tier review cycles (Weekly > Monthly > Quarterly > Yearly), and rich dashboards for life management."
namespace: "urn:sempkm:model:ppv:"
prefixes:
  ppv: "urn:sempkm:model:ppv:"
entrypoints:
  ontology: "ontology/ppv.jsonld"
  shapes: "shapes/ppv.jsonld"
  views: "views/ppv.jsonld"
  seed: "seed/ppv.jsonld"
  rules: "rules/ppv.ttl"
entailment_defaults:
  owl_inverseOf: true
  rdfs_subClassOf: false
  rdfs_subPropertyOf: false
  owl_TransitiveProperty: false
  rdfs_domain_range: false
  shacl_rules: true
