services:
  triplestore:
    image: eclipse/rdf4j-workbench:5.0.1
    volumes:
      - rdf4j_data:/var/rdf4j
    environment:
      JAVA_OPTS: "-Xmx1g"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/rdf4j-server/protocol"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sempkm

  api:
    build: ./backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend/app:/app/app
      - ./config:/app/config:ro
      - ./models:/app/models:ro
      - sempkm_data:/app/data
      - ./docs:/app/docs:ro
    env_file: .env
    environment:
      TRIPLESTORE_URL: ${TRIPLESTORE_URL:-http://triplestore:8080/rdf4j-server}
      REPOSITORY_ID: ${REPOSITORY_ID:-sempkm}
      BASE_NAMESPACE: ${BASE_NAMESPACE:-https://example.org/data/}
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///./data/sempkm.db}
      SECRET_KEY: ${SECRET_KEY:-}
      SESSION_DURATION_DAYS: ${SESSION_DURATION_DAYS:-30}
      # SMTP (optional - enables magic link emails and invitations)
      # When not configured, magic link tokens are returned directly in the browser.
      # SMTP_HOST: ${SMTP_HOST:-}
      # SMTP_PORT: ${SMTP_PORT:-587}
      # SMTP_USER: ${SMTP_USER:-}
      # SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      # SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
    depends_on:
      triplestore:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - sempkm

  frontend:
    image: nginx:stable-alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend/static:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - sempkm

networks:
  sempkm:

volumes:
  rdf4j_data:
  sempkm_data:
