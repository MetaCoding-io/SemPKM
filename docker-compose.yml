services:
  triplestore:
    image: eclipse/rdf4j-workbench:5.0.1
    ports:
      - "8080:8080"
    volumes:
      - rdf4j_data:/var/rdf4j
    environment:
      JAVA_OPTS: "-Xmx1g"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/rdf4j-server/protocol"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sempkm

  api:
    build: ./backend
    ports:
      - "8001:8000"
    volumes:
      - ./config:/app/config:ro
    environment:
      TRIPLESTORE_URL: ${TRIPLESTORE_URL:-http://triplestore:8080/rdf4j-server}
      REPOSITORY_ID: ${REPOSITORY_ID:-sempkm}
      BASE_NAMESPACE: ${BASE_NAMESPACE:-https://example.org/data/}
    depends_on:
      triplestore:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - sempkm

  frontend:
    image: nginx:stable-alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend/static:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - sempkm

networks:
  sempkm:

volumes:
  rdf4j_data:
