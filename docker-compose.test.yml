# Isolated Docker Compose stack for E2E testing.
# Uses separate volumes, ports, and a fixed secret key to avoid
# conflicts with the development environment.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d --build
#   docker compose -f docker-compose.test.yml down -v
#
services:
  triplestore:
    image: eclipse/rdf4j-workbench:5.0.1
    volumes:
      - rdf4j_test_data:/var/rdf4j
    environment:
      JAVA_OPTS: "-Xmx512m"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/rdf4j-server/protocol"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sempkm-test

  api:
    build: ./backend
    ports:
      - "8901:8000"
    volumes:
      - ./backend/app:/app/app
      - ./config:/app/config:ro
      - ./models:/app/models:ro
      - sempkm_test_data:/app/data
    environment:
      TRIPLESTORE_URL: http://triplestore:8080/rdf4j-server
      REPOSITORY_ID: sempkm_test
      BASE_NAMESPACE: https://test.example.org/data/
      DATABASE_URL: sqlite+aiosqlite:///./data/sempkm_test.db
      SECRET_KEY: e2e-test-secret-key-do-not-use-in-production
      SESSION_DURATION_DAYS: 1
    depends_on:
      triplestore:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sempkm-test

  frontend:
    image: nginx:stable-alpine
    ports:
      - "3901:80"
    volumes:
      - ./frontend/static:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - sempkm-test

networks:
  sempkm-test:

volumes:
  rdf4j_test_data:
  sempkm_test_data:
