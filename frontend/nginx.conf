server {
    listen 80;
    server_name localhost;

    # Static CSS assets served directly by nginx
    location /css/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    # Static JS assets served directly by nginx
    location /js/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    # Auth pages served as static HTML by nginx
    location = /setup.html {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    location = /login.html {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    location = /invite.html {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    # Dev console pages served as static HTML by nginx
    location = /sparql.html {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    location = /commands.html {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    # Proxy API requests to FastAPI backend (with cookie forwarding for auth)
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
    }

    # All other routes proxied to FastAPI for template rendering
    location / {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
    }
}
