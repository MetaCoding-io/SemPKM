<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPARQL Query - SemPKM</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="/js/app.js"></script>
    <script src="/js/auth.js"></script>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <a href="/">SemPKM</a>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-link">
                    <span class="nav-icon">&#127968;</span>
                    <span class="nav-label">Home</span>
                </a>
                <a href="/admin/" class="nav-link">
                    <span class="nav-icon">&#9881;</span>
                    <span class="nav-label">Admin</span>
                </a>
                <a href="/browser/" class="nav-link">
                    <span class="nav-icon">&#128193;</span>
                    <span class="nav-label">Object Browser</span>
                </a>
                <a href="/health/" class="nav-link">
                    <span class="nav-icon">&#9829;</span>
                    <span class="nav-label">Health Check</span>
                </a>
                <div class="sidebar-section">Debug Tools</div>
                <a href="/sparql.html" class="nav-link active">
                    <span class="nav-icon">&#128269;</span>
                    <span class="nav-label">SPARQL</span>
                </a>
                <a href="/commands.html" class="nav-link">
                    <span class="nav-icon">&#9654;</span>
                    <span class="nav-label">Commands</span>
                </a>
                <a href="/redoc" class="nav-link">
                    <span class="nav-icon">&#128196;</span>
                    <span class="nav-label">API Docs (ReDoc)</span>
                </a>
                <a href="/docs" class="nav-link">
                    <span class="nav-icon">&#128196;</span>
                    <span class="nav-label">API Docs (Swagger)</span>
                </a>
            </nav>
        </aside>
        <main class="content-area">
            <div id="app-content">
                <h1>SPARQL Query</h1>

                <div class="card">
                    <div class="form-group">
                        <label for="sparql-query">Query</label>
                        <textarea id="sparql-query" class="query-box" placeholder="Enter SPARQL query...">SELECT ?s ?p ?o WHERE { ?s ?p ?o } LIMIT 20</textarea>
                    </div>

                    <div class="btn-group">
                        <button class="btn-primary" onclick="runSparqlQuery()">Run Query</button>
                        <button class="btn-secondary" onclick="injectPrefixes('sparql-query')">Add Prefixes</button>
                    </div>
                </div>

                <div id="sparql-error"></div>
                <div id="sparql-results"></div>
            </div>
        </main>
    </div>

    <script>checkAuthStatus();</script>
</body>
</html>
