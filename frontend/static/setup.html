<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup - SemPKM</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/posthog.js"></script>
    <script src="/js/auth.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card card">
            <div class="auth-brand">SemPKM</div>
            <h1>Welcome to SemPKM</h1>
            <p class="auth-info">
                Enter the setup token shown in your terminal to claim this instance as owner.
            </p>

            <form id="setupForm" autocomplete="off">
                <div class="form-group">
                    <label for="setup-token">Setup Token</label>
                    <input type="text" id="setup-token" placeholder="Paste the token from your terminal" autofocus required>
                </div>
                <div class="form-group">
                    <label for="setup-email">Email (optional)</label>
                    <input type="text" id="setup-email" placeholder="owner@localhost">
                </div>
                <button type="submit" class="btn-primary auth-btn">Claim Instance</button>
            </form>

            <div id="setup-message"></div>
        </div>
    </div>

    <script>
        checkAuthStatus();
        handleSetupForm();
    </script>
</body>
</html>
