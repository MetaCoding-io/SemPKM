{% if error %}
<input type="text" class="settings-text-input" id="llm-default-model"
       value="{{ current_model }}"
       placeholder="e.g. gpt-4o or llama3"
       oninput="llmSettingChanged('default_model', this.value)">
<span class="llm-status-badge llm-status-badge--error" style="margin-left:8px;">
  {{ error }}
</span>
{% elif models %}
<select class="settings-select" id="llm-default-model"
        onchange="llmSettingChanged('default_model', this.value)">
  <option value="">-- select model --</option>
  {% for m in models %}
  <option value="{{ m }}" {% if m == current_model %}selected{% endif %}>{{ m }}</option>
  {% endfor %}
</select>
{% else %}
<input type="text" class="settings-text-input" id="llm-default-model"
       value="{{ current_model }}"
       placeholder="e.g. gpt-4o or llama3"
       oninput="llmSettingChanged('default_model', this.value)">
<span style="margin-left:8px;font-size:12px;color:var(--color-text-muted)">No models returned</span>
{% endif %}
