{# Inbox panel - right pane section for federation notifications.
   Loaded via htmx from /api/federation/inbox-partial.
   Shows notification list with per-type action buttons. #}

<details class="right-section" data-panel-name="inbox" open>
    <summary class="right-section-header" draggable="true">
        <i data-lucide="grip-vertical" class="panel-grip"></i>
        <i data-lucide="chevron-right" class="right-section-chevron"></i>
        INBOX
        <span class="inbox-badge" id="inbox-badge" style="display:none">0</span>
    </summary>
    <div class="right-section-body" id="inbox-content"
         hx-get="/api/federation/inbox-partial"
         hx-trigger="load, every 60s"
         hx-swap="innerHTML">
        <div class="right-empty">Loading notifications...</div>
    </div>
</details>
