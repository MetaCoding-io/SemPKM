<div class="vfs-browser">
    <div class="vfs-browser-header">
        <h3><i data-lucide="hard-drive"></i> Virtual Filesystem</h3>
    </div>
    <div class="vfs-tree">
        {% if models %}
        {% for model in models %}
        <div class="vfs-node vfs-model" data-model-id="{{ model.id }}">
            <div class="vfs-node-header" onclick="toggleVfsNode(this)">
                <i data-lucide="chevron-right" class="vfs-chevron"></i>
                <i data-lucide="database" class="vfs-icon"></i>
                <span class="vfs-label">{{ model.name }}</span>
            </div>
            <div class="vfs-children" style="display:none"
                 hx-get="/browser/vfs/{{ model.id }}/types"
                 hx-trigger="revealed"
                 hx-swap="innerHTML">
                <div class="vfs-loading">Loading...</div>
            </div>
        </div>
        {% endfor %}
        {% else %}
        <div class="vfs-empty">
            <i data-lucide="info"></i>
            <span>No mental models installed</span>
        </div>
        {% endif %}
    </div>
</div>
<script>
function toggleVfsNode(header) {
    var children = header.nextElementSibling;
    var chevron = header.querySelector('.vfs-chevron');
    if (children) {
        var isOpen = children.style.display !== 'none';
        children.style.display = isOpen ? 'none' : '';
        if (chevron) chevron.style.transform = isOpen ? '' : 'rotate(90deg)';
    }
}
if (typeof lucide !== 'undefined') lucide.createIcons();
</script>
