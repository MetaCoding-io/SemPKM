<div class="view-toolbar" data-current-filter="{{ current_filter }}" data-current-sort="{{ sort_col }}" data-current-dir="{{ sort_dir }}">
    <div class="view-toolbar-left">
        <span class="view-label">{{ spec.label }}</span>
    </div>
    <div class="view-toolbar-right">
        {% set current_view_type = view_type | default('table') %}
        {% set filter_base_url = "/browser/views/" ~ current_view_type ~ "/" ~ spec_iri_encoded %}
        {% if spec.renderer_type == 'graph' %}
        <input type="text"
               id="view-filter"
               class="view-filter-input"
               placeholder="Filter {{ type_label }}..."
               value="{{ current_filter }}"
               oninput="if(typeof filterGraph==='function') filterGraph(this.value)">
        {% else %}
        <input type="text"
               id="view-filter"
               class="view-filter-input"
               placeholder="Filter {{ type_label }}..."
               value="{{ current_filter }}"
               name="filter"
               hx-get="{{ filter_base_url }}"
               hx-target="closest .group-editor-area"
               hx-swap="innerHTML"
               hx-trigger="keyup changed delay:300ms"
               hx-include="this"
               hx-vals='{"page": "1", "page_size": "{{ page_size }}", "sort": "{{ sort_col | default('') }}", "dir": "{{ sort_dir | default('asc') }}"{% if group_by is defined and group_by %}, "group_by": "{{ group_by }}"{% endif %}}'>
        {% endif %}
        {% if spec.renderer_type == 'table' %}
        <button class="view-columns-btn" onclick='ColumnPrefs.openColumnSettings("{{ type_iri }}", {{ columns | tojson }})' title="Column settings">
            &#9881;
        </button>
        {% endif %}
    </div>
</div>
<script>
if (!window._viewFilterRefocusBound) {
    window._viewFilterRefocusBound = true;
    document.body.addEventListener('htmx:afterSwap', function (evt) {
        if (evt.detail.target && evt.detail.target.classList.contains('group-editor-area')) {
            var input = document.getElementById('view-filter');
            if (input && document.activeElement !== input) {
                input.focus();
                var len = input.value.length;
                input.setSelectionRange(len, len);
            }
        }
    });
}
</script>
