<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SemPKM{% endblock %}</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="/js/auth.js"></script>
    <link rel="stylesheet" href="/css/workspace.css">
    <link rel="stylesheet" href="/css/forms.css">
    <link rel="stylesheet" href="/css/views.css">
    <script src="https://unpkg.com/split.js@1.6.5/dist/split.min.js"></script>
    <script type="module" src="https://unpkg.com/ninja-keys?module"></script>
    <!-- Cytoscape.js graph visualization -->
    <script src="https://unpkg.com/cytoscape@3.33.1/dist/cytoscape.min.js"></script>
    <script src="https://unpkg.com/layout-base@2.0.1/layout-base.js"></script>
    <script src="https://unpkg.com/cose-base@2.2.0/cose-base.js"></script>
    <script src="https://unpkg.com/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>
    <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
    <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
    <!-- Markdown rendering (Phase 11: read-only object view) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-highlight/lib/index.umd.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="dashboard-layout">
        {% include "components/_sidebar.html" %}
        <main class="content-area">
            <div id="app-content">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script>
        // Highlight the active sidebar link based on current URL
        function updateActiveNav() {
            var path = window.location.pathname;
            document.querySelectorAll('.sidebar-nav .nav-link').forEach(function(link) {
                var href = link.getAttribute('href');
                if (path === '/' && href === '/') {
                    link.classList.add('active');
                } else if (href !== '/' && path.startsWith(href)) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        }
        updateActiveNav();
        checkAuthStatus();

        function loadDocsIframe(url, linkEl) {
            var content = document.getElementById('app-content');
            content.innerHTML = '<iframe src="' + url + '" class="docs-iframe"></iframe>';
            history.pushState(null, '', url);
            // Update active nav manually
            document.querySelectorAll('.sidebar-nav .nav-link').forEach(function(l) {
                l.classList.remove('active');
            });
            if (linkEl) linkEl.classList.add('active');
            return false;
        }
        // Update active state after htmx navigation
        document.body.addEventListener('htmx:pushedIntoHistory', updateActiveNav);
        document.body.addEventListener('htmx:historyRestore', updateActiveNav);
    </script>
    <script src="/js/cleanup.js"></script>
    <script src="/js/markdown-render.js"></script>
    <script type="module" src="/js/editor.js"></script>
    <script src="/js/workspace.js"></script>
    <script src="/js/graph.js"></script>
    <script src="/js/column-prefs.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
